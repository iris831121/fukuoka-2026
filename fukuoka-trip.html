<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>福岡五日遊 2026 🇯🇵</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans TC','Hiragino Sans','PingFang TC',sans-serif;
  background: #FDF7EF;
  min-height: 100vh;
  padding: 16px 12px 40px;
}
.wrap { max-width: 420px; margin: 0 auto; }

/* ── Header ── */
.header-box {
  border: 2.5px solid #C8A882;
  border-radius: 16px;
  background: #FDF0E0CC;
  text-align: center;
  padding: 14px 12px 12px;
  margin-bottom: 16px;
}
.header-top { display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:4px; }
.header-flag { font-size:28px; }
.header-title { font-size:22px; font-weight:900; color:#3D2C1E; letter-spacing:1px; }
.header-year { font-size:13px; font-weight:700; color:#C8A882; letter-spacing:2px; margin-bottom:6px; }
.header-sub { display:flex; justify-content:center; gap:8px; flex-wrap:wrap; }
.header-pill { border:1.5px solid #D4B896; border-radius:20px; padding:3px 12px; font-size:12px; color:#9E7A5A; font-weight:700; background:#FFF; }

/* ── Tabs ── */
.tabs { display:flex; gap:6px; overflow-x:auto; padding-bottom:6px; margin-bottom:14px; scrollbar-width:none; }
.tabs::-webkit-scrollbar { display:none; }
.tab { flex-shrink:0; padding:7px 11px; border-radius:14px; border:1.5px solid #E0D0C0; cursor:pointer; background:#FFF; font-size:10px; color:#9E8570; text-align:center; transition:all 0.2s; line-height:1.4; user-select:none; }
.tab.active { color:var(--tc); background:var(--tb); border-color:var(--tc); font-weight:800; }
.tab-emoji { font-size:18px; display:block; }

/* ── Day header banner ── */
.day-banner {
  border-radius:16px;
  padding:12px 16px 10px;
  margin-bottom:10px;
  display:flex; justify-content:space-between; align-items:center; gap:8px;
  border:2px solid var(--dc);
  background:var(--db);
}
.washi {
  display:inline-block;
  padding:2px 10px;
  border-radius:5px;
  font-size:10px; font-weight:800; color:#3D2C1E;
  margin-bottom:4px;
  transform:rotate(-0.6deg);
  letter-spacing:.5px;
}
.day-title { font-size:17px; font-weight:900; color:#3D2C1E; line-height:1.3; }

/* ── Timeline rows ── */
.tl-wrap { padding: 0 2px; }
.tl-row {
  display:flex; align-items:flex-start; gap:8px;
  margin-bottom:8px; position:relative;
}
.tl-row.is-note { margin-bottom:5px; padding-left:44px; }

/* left column: time dot */
.tl-col { flex-shrink:0; width:40px; display:flex; flex-direction:column; align-items:center; gap:2px; }
.tl-dot {
  width:30px; height:30px; border-radius:50%;
  background:#FFF;
  border:2px solid var(--dc,#C8A882);
  display:flex; align-items:center; justify-content:center;
  font-size:14px;
  flex-shrink:0;
}
.tl-time { font-size:9px; font-weight:800; color:var(--dc,#C8A882); white-space:nowrap; text-align:center; }
.tl-vline {
  position:absolute; left:19px; top:34px; bottom:-8px;
  border-left:2px dashed var(--dc,#C8A882); opacity:.35;
}

/* right card: text + inline illust */
.tl-card {
  flex:1; min-width:0;
  border:1.5px solid var(--cardb,#E8D9C4);
  border-radius:13px;
  background:var(--cardbg,#FAF5EE);
  padding:8px 10px;
}
.tl-row-inner {
  display:flex; align-items:center; justify-content:space-between; gap:6px;
  flex-wrap:nowrap;
}
.tl-texts { flex:1; min-width:0; }
.tl-name { font-size:13px; font-weight:800; color:#3D2C1E; line-height:1.35; }
.tl-note { font-size:11px; color:#9E8570; line-height:1.4; margin-top:2px; }
.tl-illust { flex-shrink:0; display:flex; align-items:center; }

/* note sub-rows */
.note-inner { display:flex; align-items:flex-start; gap:6px; }
.note-num { flex-shrink:0; width:20px; height:20px; border-radius:50%; background:#F5F0EA; border:1.5px solid #D4C5B5; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:800; color:#9E8570; }
.note-body { flex:1; }
.note-place { font-size:12px; font-weight:700; color:#7A6655; }
.note-sub { font-size:11px; color:#A89480; margin-left:3px; }
.note-illust { flex-shrink:0; }

/* ── Info page ── */
.sec-card { border:2px solid var(--dc); border-radius:14px; background:var(--db); padding:12px 14px; margin-bottom:10px; }
.sec-head { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.sec-title { font-size:13px; font-weight:900; color:#3D2C1E; }
.info-row { display:flex; align-items:flex-start; gap:8px; background:#FFFFFF99; border-radius:10px; padding:7px 10px; margin-bottom:6px; border:1px solid var(--dc); font-size:12px; color:#4A3728; line-height:1.5; }
.info-row:last-child { margin-bottom:0; }
.info-icon { font-size:17px; flex-shrink:0; margin-top:1px; }

.footer { text-align:center; padding:14px 0 0; font-size:11px; color:#C4A882; font-style:italic; letter-spacing:1px; }
</style>
</head>

const typeMap = {
  t:{dot:"#C8A882",cardbg:"#FAF5EE",cardb:"#E8D9C4"},
  f:{dot:"#E8998A",cardbg:"#FEF3F0",cardb:"#F5D5CE"},
  s:{dot:"#7BADC7",cardbg:"#EEF4F9",cardb:"#C8DDE9"},
  sh:{dot:"#9EB89A",cardbg:"#EFF5EF",cardb:"#C8DCC5"},
  n:{dot:"#D4C5B5",cardbg:"transparent",cardb:"transparent"},
};

let active = 0;

function render() {
  const tabsEl = document.getElementById('tabs');
  const contentEl = document.getElementById('content');

  tabsEl.innerHTML = DAYS.map((d,i)=>`
    <div class="tab ${i===active?'active':''}" style="--tc:${d.color};--tb:${d.bg}" onclick="go(${i})">
      <span class="tab-emoji">${d.emoji}</span>
      ${d.isInfo?'備忘':'Day '+d.id}
    </div>`).join('');

  const cur = DAYS[active];

  if (cur.isInfo) {
    contentEl.innerHTML = `
      <div class="day-banner" style="--dc:${cur.color};--db:${cur.bg}">
        <div>
          <div class="washi" style="background:${cur.color}30;border:1.5px solid ${cur.color}60">${cur.emoji} 出發前確認清單</div>
          <div class="day-title">${cur.title}</div>
        </div>
        <div>${IL[cur.hsvg]||''}</div>
      </div>
      ${cur.sections.map(sec=>`
        <div class="sec-card" style="--dc:${sec.color};--db:${sec.color}12">
          <div class="sec-head">
            ${sec.svg&&IL[sec.svg]?`<div>${IL[sec.svg]}</div>`:''}
            <div class="sec-title">${sec.title}</div>
          </div>
          ${sec.items.map(it=>`
            <div class="info-row" style="border-color:${sec.color}40">
              <span class="info-icon">${it.icon}</span><span>${it.text}</span>
            </div>`).join('')}
        </div>`).join('')}`;
    return;
  }

  let noteCount = 0;
  const rows = cur.items.map((item,idx)=>{
    const isLast = idx===cur.items.length-1;
    const tc = typeMap[item.type]||typeMap.n;

    if (item.type==='n') {
      noteCount++;
      const illHtml = item.il&&IL[item.il] ? `<div class="note-illust">${IL[item.il]}</div>` : '';
      return `
        <div class="tl-row is-note">
          <div class="note-inner" style="flex:1">
            <div class="note-num">${noteCount}</div>
            <div class="note-body" style="flex:1">
              <span class="note-place">${item.place}</span>
              ${item.note?`<span class="note-sub">${item.note}</span>`:''}
            </div>
            ${illHtml}
          </div>
        </div>`;
    }
    noteCount = 0;

    const illHtml = item.il&&IL[item.il] ? `<div class="tl-illust">${IL[item.il]}</div>` : '';
    return `
      <div class="tl-row" style="--dc:${tc.dot}">
        ${!isLast?`<div class="tl-vline"></div>`:''}
        <div class="tl-col">
          <div class="tl-dot" style="border-color:${tc.dot}88;font-size:14px">${item.icon}</div>
          ${item.time?`<div class="tl-time">${item.time}</div>`:''}
        </div>
        <div class="tl-card" style="--cardbg:${tc.cardbg};--cardb:${tc.cardb}">
          <div class="tl-row-inner">
            <div class="tl-texts">
              <div class="tl-name">${item.place}</div>
              ${item.note?`<div class="tl-note">${item.note}</div>`:''}
            </div>
            ${illHtml}
          </div>
        </div>
      </div>`;
  }).join('');

  contentEl.innerHTML = `
    <div class="day-banner" style="--dc:${cur.color};--db:${cur.bg}">
      <div>
        <div class="washi" style="background:${cur.color}30;border:1.5px solid ${cur.color}60">DAY ${cur.id} · ${cur.date}</div>
        <div class="day-title">${cur.title}</div>
      </div>
      <div>${IL[cur.hsvg]||''}</div>
    </div>
    <div class="tl-wrap">${rows}</div>`;
}

function go(i){active=i;render();}
render();
</script>
